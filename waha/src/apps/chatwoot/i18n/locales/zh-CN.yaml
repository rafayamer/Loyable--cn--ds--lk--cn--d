app.connected.message: |-
  🔗 **已连接：WhatsApp 会话到收件箱**

  ✅ WhatsApp 会话 **{{{name}}}** 已成功连接到此收件箱。

  此收件箱现已链接到你的**WhatsApp 账号**。你可以在这里直接收发消息——就像使用 WhatsApp 一样，但在此工作区内完成。

  你也可以管理与此收件箱关联的 WhatsApp 会话。要查看可用操作，请向此对话发送 **help**。

  📋 你可以执行的常见操作：
  - 检查 WhatsApp 会话是否活动
  - 重启或停止 WhatsApp 会话
  - 登出并通过扫描新的二维码重新连接

  如果一切正常，你就可以自由聊天。如果你看到警告，可能需要重新连接你的 WhatsApp 账号。

  开始吧！🚀

app.disconnected.message: |-
  🔌 **已断开：从收件箱断开 WhatsApp 会话**

  ❌ WhatsApp 会话 **{{{name}}}** 已与此收件箱断开。

  你将无法再从 WhatsApp 发送或接收消息。

  如需重新连接，请联系你的管理员。

app.updated.message: |-
  🔄 **已更新：WhatsApp 会话设置**

  ✅ WhatsApp 会话 **{{{name}}}** 的设置已更新。

