cli.cmd.messages.summary: 拉取 WhatsApp 消息。
cli.cmd.messages.description:
  💬 运行 `messages pull` 开始同步，或运行 `messages status` 查看进度。
cli.cmd.messages.action.description:
  使用 `pull` 开始拉取或 `status` 查看正在执行的任务。
cli.cmd.messages.pull.option.chat: 将拉取限制为特定 WhatsApp 聊天 ID。
cli.cmd.messages.pull.option.force:
  即使该 WhatsApp 消息已存在于会话映射中，也强制收件箱创建消息。
cli.cmd.messages.pull.option.batch: 每个批次要拉取的消息数量。
cli.cmd.messages.pull.option.progress:
  每隔 N 条消息报告进度。设置为 0 可关闭报告。
cli.cmd.messages.pull.option.no-dm: 拉取历史时跳过私聊消息。
cli.cmd.messages.pull.option.groups: 拉取历史时包含 WhatsApp 群聊。
cli.cmd.messages.pull.option.channels: 拉取历史时包含 WhatsApp 频道。
cli.cmd.messages.pull.option.status: 拉取历史时包含 WhatsApp 状态更新。
cli.cmd.messages.pull.option.broadcast: 拉取历史时包含群发列表。
cli.cmd.messages.pull.option.media: 拉取历史时下载媒体附件（图片、视频、文件）。
cli.cmd.messages.pull.option.pause:
  将拉取任务以暂停状态加入队列，并在完成前暂停新的 WhatsApp 消息处理。
cli.cmd.messages.pull.option.resolve-conversations: 在处理完所有历史消息后将会话标记为已解决。
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ 无法使用 `--pause`，因为此配置中 **queue** 命令已禁用。
