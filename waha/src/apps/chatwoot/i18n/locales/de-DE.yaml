cli.cmd.root.sub.queue: '🧩 **Warteschlange**:'
cli.cmd.messages.summary: WhatsApp-Nachrichten abrufen.
cli.cmd.messages.description:
  💬 Führen Sie `messages pull` aus, um eine Synchronisierung zu starten, oder
  `messages status`, um den Fortschritt zu prüfen.
cli.cmd.messages.action.description:
  '`pull`, um das Abrufen zu starten, oder `status`, um den aktuellen Job zu
  prüfen.'
cli.cmd.messages.pull.option.chat:
  Beschränkt das Abrufen auf eine bestimmte WhatsApp-Chat-ID.
cli.cmd.messages.pull.option.force:
  Erzwingt, dass die Inbox Nachrichten erstellt, auch wenn die
  WhatsApp-Nachricht bereits im Gesprächs-Mapping vorhanden ist.
cli.cmd.messages.pull.option.batch:
  Anzahl der Nachrichten, die pro Paket abgerufen werden.
cli.cmd.messages.pull.option.progress:
  Meldet den Fortschritt nach N Nachrichten. 0 deaktiviert die
  Fortschrittsmeldungen.
cli.cmd.messages.pull.option.no-dm:
  Ignoriert Direktnachrichten beim Abrufen des Verlaufs.
cli.cmd.messages.pull.option.groups:
  Bezieht WhatsApp-Gruppen beim Abrufen mit ein.
cli.cmd.messages.pull.option.channels:
  Bezieht WhatsApp-Kanäle beim Abrufen mit ein.
cli.cmd.messages.pull.option.status:
  Bezieht WhatsApp-Statusmeldungen beim Abrufen mit ein.
cli.cmd.messages.pull.option.broadcast:
  Bezieht Broadcast-Listen beim Abrufen mit ein.
cli.cmd.messages.pull.option.media:
  Lädt Medienanhänge (Bilder, Videos, Dateien) beim Abrufen herunter.
cli.cmd.messages.pull.option.pause:
  Stellt den Nachrichtenabruf in der Warteschlange auf Pause und stoppt neue
  WhatsApp-Verarbeitung bis zum Abschluss.
cli.cmd.messages.pull.option.resolve-conversations:
  Markiert die Gespräche nach Abschluss aller historischen Nachrichten als
  erledigt.
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ `--pause` kann nicht verwendet werden, weil der **queue**-Befehl in dieser
  Konfiguration deaktiviert ist.
