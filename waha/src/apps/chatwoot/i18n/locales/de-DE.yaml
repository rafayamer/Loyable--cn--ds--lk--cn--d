  Legt fest, wo das Abruffenster endet; `2d` bedeutet vor zwei Tagen.
cli.cmd.messages.pull.argument.start:
  Legt fest, wo das Abruffenster beginnt; `1d` bedeutet vor einem Tag (Standard
  `0d`, also jetzt).
