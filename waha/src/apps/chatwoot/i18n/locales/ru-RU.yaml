cli.cmd.root.sub.queue: '🧩 **Очередь**:'
cli.cmd.messages.summary: Загрузить сообщения WhatsApp.
cli.cmd.messages.description:
  💬 Выполните `messages pull`, чтобы запустить синхронизацию, или `messages
  status`, чтобы проверить прогресс.
cli.cmd.messages.action.description:
  '`pull` — начать загрузку, `status` — посмотреть текущую задачу.'
cli.cmd.messages.pull.option.chat:
  Ограничить загрузку конкретным идентификатором чата WhatsApp.
cli.cmd.messages.pull.option.force:
  Принудительно создавать сообщения в ящике, даже если сообщение WhatsApp уже
  есть в сопоставлении беседы.
cli.cmd.messages.pull.option.batch: Количество сообщений в каждом пакете.
cli.cmd.messages.pull.option.progress:
  Сообщать о прогрессе каждые N сообщений. Значение 0 отключает отчёты.
cli.cmd.messages.pull.option.no-dm:
  Пропускать личные сообщения при загрузке истории.
cli.cmd.messages.pull.option.groups:
  Включать группы WhatsApp при загрузке истории.
cli.cmd.messages.pull.option.channels:
  Включать каналы WhatsApp при загрузке истории.
cli.cmd.messages.pull.option.status:
  Включать статусы WhatsApp при загрузке истории.
cli.cmd.messages.pull.option.broadcast:
  Включать списки рассылок при загрузке истории.
cli.cmd.messages.pull.option.media:
  Скачивать медиафайлы (изображения, видео, документы) при загрузке истории.
cli.cmd.messages.pull.option.pause:
  Поставить задачу загрузки сообщений в очередь на паузу и остановить обработку
  новых сообщений WhatsApp до завершения.
cli.cmd.messages.pull.option.resolve-conversations:
  Отмечает беседы как завершённые после обработки всей истории сообщений.
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ Невозможно использовать `--pause`, потому что команда **queue** отключена в
  этой конфигурации.
