cli.cmd.messages.pull.option.timeout-media:
  Указывает, как долго пытаться скачать медиа для каждого сообщения.
cli.cmd.messages.pull.argument.end:
  Задаёт конец окна загрузки, например `2d` — до двух дней назад.
cli.cmd.messages.pull.argument.start:
  Задаёт начало окна загрузки, например `1d` — с одного дня назад (по умолчанию
  `0d`, то есть сейчас).
cli.cmd.messages.pull.already-running: >-
  ⏳ Задача **Pull Messages** уже выполняется для **{{{chat}}}**. Дождитесь
  завершения или остановите её перед запуском новой.


  Отправьте `messages status` для деталей.
cli.cmd.messages.status.not-found:
  ℹ️ Активная задача **Pull Messages** не найдена. Запустите её командой
  `messages pull`.
cli.cmd.messages.pull.no-chats-found:
  Чаты WhatsApp для выбранного периода не найдены.
cli.cmd.contacts.pull.option.progress:
  Сообщать о прогрессе каждые N контактов. Значение 0 отключает отчёты.
cli.cmd.contacts.pull.option.lids:
  Включать контакты WhatsApp LID (анонимные контакты) в синхронизацию.
