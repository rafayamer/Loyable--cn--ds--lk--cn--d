app.connected.message: |-
  🔗 **ПОДКЛЮЧЕНО: Сессия WhatsApp к Inbox**

  ✅ Сессия WhatsApp **{{{name}}}** была успешно подключена к этому Inbox.

  Этот inbox теперь связан с вашим **аккаунтом WhatsApp**. Вы можете отправлять и получать сообщения прямо отсюда — как в WhatsApp, но внутри вашего рабочего пространства.

  Вы также можете управлять сессией WhatsApp, связанной с этим inbox. Чтобы увидеть доступные действия, отправьте **help** в этот чат.

  📋 Общие действия, которые вы можете выполнить:
  - Проверить, активна ли сессия WhatsApp
  - Перезапустить или остановить сессию WhatsApp
  - Выйти и переподключиться, отсканировав новый QR-код

  Если всё работает, вы сможете свободно общаться. Если вы видите предупреждения, возможно, вам потребуется переподключить ваш аккаунт WhatsApp.

  Давайте начнем! 🚀

app.disconnected.message: |-
  🔌 **ОТКЛЮЧЕНО: Сессия WhatsApp от Inbox**

  ❌ Сессия WhatsApp **{{{name}}}** была отключена от этого Inbox.

  Вы больше не сможете отправлять или получать сообщения из WhatsApp.

  Для переподключения, пожалуйста, обратитесь к вашему администратору.

