app.connected.message: |-
  🔗 **متصل: جلسه واتساپ به صندوق ورودی**

  ✅ جلسه واتساپ **{{{name}}}** با موفقیت به این صندوق ورودی متصل شده است.

  این صندوق ورودی اکنون به **حساب واتساپ** شما متصل است. شما می‌توانید پیام‌ها را مستقیماً از اینجا ارسال و دریافت کنید — درست مانند استفاده از واتساپ، اما در فضای کاری شما.

  همچنین می‌توانید جلسه واتساپ متصل به این صندوق ورودی را مدیریت کنید. برای مشاهده اقدامات موجود، **help** را به این گفتگو ارسال کنید.

  📋 اقدامات رایجی که می‌توانید انجام دهید:
  - بررسی کنید که آیا جلسه واتساپ فعال است
  - راه‌اندازی مجدد یا توقف جلسه واتساپ
  - خروج و اتصال مجدد با اسکن کد QR جدید

  اگر همه چیز کار می‌کند، می‌توانید آزادانه گفتگو کنید. اگر هشدارهایی می‌بینید، ممکن است نیاز به اتصال مجدد حساب واتساپ خود داشته باشید.

  بیایید شروع کنیم! 🚀

app.disconnected.message: |-
  🔌 **قطع اتصال: جلسه واتساپ از صندوق ورودی**

  ❌ جلسه واتساپ **{{{name}}}** از این صندوق ورودی قطع شده است.

  شما دیگر قادر به ارسال یا دریافت پیام از واتساپ نخواهید بود.

  برای اتصال مجدد، لطفاً با مدیر خود تماس بگیرید.

app.updated.message: |-
  🔄 **به‌روزرسانی: تنظیمات جلسه واتساپ**

  ✅ تنظیمات جلسه واتساپ **{{{name}}}** به‌روزرسانی شده است.

