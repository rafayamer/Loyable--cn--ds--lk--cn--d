cli.cmd.messages.summary: دریافت پیام‌های واتساپ.
cli.cmd.messages.description:
  💬 برای آغاز همگام‌سازی پیام‌ها `messages pull` را اجرا کنید یا برای مشاهده
  پیشرفت `messages status` را اجرا کنید.
cli.cmd.messages.action.description:
  '`pull` برای شروع دریافت پیام یا `status` برای بررسی کار فعال.'
cli.cmd.messages.pull.option.chat:
  دریافت را به یک شناسه گفت‌وگوی مشخص واتساپ محدود می‌کند.
cli.cmd.messages.pull.option.force:
  صندوق ورودی را مجبور می‌کند پیام بسازد حتی اگر پیام واتساپ قبلاً در نگاشت
  مکالمه وجود داشته باشد.
cli.cmd.messages.pull.option.batch:
  تعداد پیام‌هایی که در هر دسته دریافت می‌شوند.
cli.cmd.messages.pull.option.progress:
  پیشرفت را هر N پیام اعلام می‌کند. مقدار 0 گزارش‌ها را غیرفعال می‌کند.
cli.cmd.messages.pull.option.no-dm:
  هنگام دریافت تاریخچه، پیام‌های خصوصی را نادیده می‌گیرد.
cli.cmd.messages.pull.option.groups:
  گروه‌های واتساپ را هنگام دریافت تاریخچه وارد می‌کند.
cli.cmd.messages.pull.option.channels:
  کانال‌های واتساپ را هنگام دریافت تاریخچه وارد می‌کند.
cli.cmd.messages.pull.option.status:
  وضعیت‌های واتساپ را هنگام دریافت تاریخچه وارد می‌کند.
cli.cmd.messages.pull.option.broadcast:
  لیست‌های پخش را هنگام دریافت تاریخچه وارد می‌کند.
cli.cmd.messages.pull.option.media:
  هنگام دریافت تاریخچه، پیوست‌های رسانه‌ای (تصویر، ویدیو، فایل) را دانلود
  می‌کند.
cli.cmd.messages.pull.option.pause:
  کار دریافت پیام‌ها را در حالت توقف در صف قرار می‌دهد و پردازش پیام‌های جدید
  واتساپ را تا پایان متوقف می‌کند.
cli.cmd.messages.pull.option.resolve-conversations:
  پس از پردازش تمام پیام‌های تاریخچه، مکالمه‌ها را به‌عنوان حل‌شده علامت‌گذاری
  می‌کند.
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ امکان استفاده از `--pause` نیست زیرا فرمان **queue** در این پیکربندی
  غیرفعال است.
cli.cmd.queue.description: مدیریت صف‌ها.
cli.cmd.queue.summary: اعمال روی صف‌ها را انجام دهید.
cli.cmd.queue.action.description: یک عمل را انتخاب کنید.
cli.cmd.queue.status.description: وضعیت یک صف را نشان می‌دهد.
cli.cmd.queue.argument.name: 'نام صف: `inbox` یا `whatsapp` (اختیاری).'
cli.cmd.queue.start.description: صف را بر اساس نام شروع کنید.
cli.cmd.queue.stop.description: صف را بر اساس نام متوقف کنید.
cli.cmd.queue.paused:
  ⚪🧩 صف‌ها متوقف شده‌اند. برای بررسی وضعیت `queue status` را ارسال کنید.
cli.cmd.queue.resumed:
  🟢🧩 صف‌ها از سر گرفته شدند. برای بررسی وضعیت `queue status` را ارسال کنید.
cli.cmd.queue.status.result: >-
  📊 وضعیت صف:

  {{#queues}}

  - **{{name}}**: {{#locked}}🔒{{/locked}}{{#paused}}⚪
  متوقف{{/paused}}{{^paused}}🟢 فعال{{/paused}}

  {{/queues}}
cli.cmd.messages.pull.option.timeout-media:
  مدت تلاش برای دانلود رسانه هر پیام را مشخص می‌کند.
cli.cmd.messages.pull.argument.end:
  پایان بازه دریافت را تعیین می‌کند؛ برای مثال `2d` یعنی دو روز پیش متوقف
  می‌شود.
cli.cmd.messages.pull.argument.start:
  آغاز بازه دریافت را تعیین می‌کند؛ برای مثال `1d` یعنی یک روز پیش (پیش‌فرض `0d`
  یعنی اکنون).
cli.cmd.messages.pull.already-running: >-
  ⏳ کار **Pull Messages** هم‌اکنون برای **{{{chat}}}** در حال اجراست. منتظر
  بمانید تا تمام شود یا قبل از شروع کار جدید، آن را متوقف کنید.


  برای جزئیات `messages status` را ارسال کنید.
cli.cmd.messages.status.not-found:
  ℹ️ هیچ کار فعال **Pull Messages** پیدا نشد. با `messages pull` یک کار را آغاز
  کنید.
cli.cmd.messages.pull.no-chats-found:
  هیچ گفت‌وگوی واتساپی برای این بازه زمانی پیدا نشد.
cli.cmd.contacts.pull.option.progress:
  پیشرفت را هر N مخاطب اعلام می‌کند. مقدار 0 گزارش‌ها را غیرفعال می‌کند.
cli.cmd.contacts.pull.option.lids:
  مخاطبین ناشناس واتساپ (LID) را در همگام‌سازی وارد می‌کند.
task.contacts.completed:
  👤✅ مخاطبین تکمیل شدند → 🆕 {{progress.created}}، 🔄 {{progress.updated}}، ⚪
  {{progress.skipped}}، 🔴 {{progress.errors}}، 🖼️ {{progress.avatar.updated}}
task.messages.started: ⏳ در حال دریافت پیام‌ها 💬 {{{chat}}} ⏱️ {{{period}}}...
task.messages.details:
  برای جزئیات بیشتر "{{{prefix}}}messages status" را ارسال کنید.
task.messages.progress:
  '⏳ پیام‌های {{{chat}}}: 🆕 {{progress.ok}}، 🟢 {{progress.exists}}، ⚪
  {{progress.ignored}}، 🔴 {{progress.errors}}{{#messages.last}} | 📅
  {{{messages.last}}}{{/messages.last}}'
task.messages.completed:
  ✅ پیام‌های {{{chat}}} در {{{period}}} → 🆕 {{progress.ok}}، 🟢
  {{progress.exists}}، ⚪ {{progress.ignored}}، 🔴 {{progress.errors}}
task.messages.status: |-
  پیام‌های **{{{chat}}}** در بازه ⏱️ **{{{period}}}**. ⚙️ وضعیت کار: **{{state}}**.

  🗨️ پیام‌ها:
  - 🆕 ایجاد شده: **{{{progress.ok}}}**
  - 🟢 موجود: {{{progress.exists}}}
  - ⚪ نادیده گرفته شده: {{{progress.ignored}}}
  - 🔴 خطا: {{{progress.errors}}}
  {{#messages.first}}
  - 🗓️ قدیمی‌ترین: **{{{messages.first}}}**
  {{/messages.first}}
  {{#messages.last}}
  - 🗓️ جدیدترین: **{{{messages.last}}}**
  {{/messages.last}}

  💬 گفت‌وگوهای واتساپ:
  - 🆕 پیام‌های جدید در **{{{chats}}}** گفت‌وگو
  {{#options.resolveConversations}}

  🗣️ مکالمه‌ها:
  - 🟢 حل شد: **{{{progress.conversationResolve.success}}}**
  {{#progress.conversationResolve.error}}
  - 🔴 خطا: **{{{progress.conversationResolve.error}}}**
  {{/progress.conversationResolve.error}}
  {{/options.resolveConversations}}

  جزئیات:
  [{{{details.text}}}]({{{details.url}}})
