cli.cmd.messages.summary: |-
  Recupera i messaggi WhatsApp.

cli.cmd.messages.description: |-
  💬 Esegui `messages pull` per richiedere la sincronizzazione dei messaggi o `messages status` per verificarne l'avanzamento.

cli.cmd.messages.action.description: |-
  `pull` per avviare il recupero messaggi o `status` per ispezionare il job attivo.

cli.cmd.messages.pull.option.chat: |-
  Limita il recupero a uno specifico ID chat WhatsApp.

cli.cmd.messages.pull.option.force: |-
  Forza l'inbox a creare messaggi anche se esistono già nella mappatura conversazioni.

cli.cmd.messages.pull.option.batch: |-
  Numero di messaggi da recuperare per ogni batch.

cli.cmd.messages.pull.option.progress: |-
  Segnala i progressi ogni N messaggi. Imposta 0 per disattivare i report.

cli.cmd.messages.pull.option.no-dm: |-
  Salta i messaggi diretti durante il recupero della cronologia.

cli.cmd.messages.pull.option.groups: |-
  Includi le chat di gruppo WhatsApp durante il recupero.

cli.cmd.messages.pull.option.channels: |-
  Includi i Canali WhatsApp nel recupero.

cli.cmd.messages.pull.option.status: |-
  Includi gli aggiornamenti di stato WhatsApp durante il recupero.

cli.cmd.messages.pull.option.broadcast: |-
  Includi le liste broadcast durante il recupero.

cli.cmd.messages.pull.option.media: |-
  Recupera allegati media (immagini, video, file) durante il recupero.

cli.cmd.messages.pull.option.pause: |-
  Accoda il job in stato di pausa, bloccando la ricezione di nuovi messaggi finché non termina.

cli.cmd.messages.pull.option.resolve-conversations: |-
  Segna le conversazioni come risolte dopo l'elaborazione della cronologia.

cli.cmd.messages.pull.error.pause-no-queue: |-
  ⛔ Impossibile usare `--pause` perché il comando **queue** è disabilitato in questa configurazione.

