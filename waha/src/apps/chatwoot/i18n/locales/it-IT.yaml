app.connected.message: |-
  🔗 **CONNESSO: Sessione WhatsApp all'Inbox**

    ✅ La sessione WhatsApp **{{{name}}}** è stata collegata con successo a questa inbox.

    Questa inbox è ora collegata al tuo **Account WhatsApp**. Puoi inviare e ricevere messaggi direttamente da qui — proprio come usare WhatsApp, ma all'interno del tuo spazio di lavoro.

    Puoi anche gestire la sessione WhatsApp collegata a questa inbox. Per visualizzare le azioni disponibili, invia **help** a questa chat.

    📋 Azioni comuni che puoi eseguire:
    - Verificare se la sessione WhatsApp è attiva
    - Riavviare o fermare la sessione WhatsApp
    - Disconnettersi e riconnettersi scansionando un nuovo codice QR

    Se tutto funziona, potrai chattare liberamente. Se vedi avvisi, potrebbe essere necessario riconnettere il tuo account WhatsApp.

    Iniziamo! 🚀

app.disconnected.message: |-
  🔌 **DISCONNESSO: Sessione WhatsApp dall'Inbox**

  ❌ La sessione WhatsApp **{{{name}}}** è stata disconnessa.

  Non sarà più possibile inviare o ricevere messaggi.

  Per riconnettere, contatta l'amministratore.

app.updated.message: |-
  🔄 **AGGIORNATO: Impostazioni della sessione WhatsApp**

  ✅ Le impostazioni per la sessione WhatsApp **{{{name}}}** sono state aggiornate.

