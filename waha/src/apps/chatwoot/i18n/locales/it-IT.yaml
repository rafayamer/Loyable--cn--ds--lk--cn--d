# Italian translations for WhatsApp inbox integration
locale.name: '🇮🇹 Italiano (Italy)'

# Base locale code - must be a valid BCP 47 locale
# https://en.wikipedia.org/wiki/IETF_language_tag
# WAHA uses it for number, currency and datetime representation
locale.base: 'it-IT'

app.inbox.contact.name: 'Integrazione WhatsApp'
app.inbox.contact.avatar.url: 'https://raw.githubusercontent.com/devlikeapro/waha/core/logo.png'

# "options" from date.toLocaleString
# https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat/DateTimeFormat#options
datetime:
  weekday: short
  locales: it-IT
  day: 2-digit
  month: short
  year: numeric
  hour: 2-digit
  minute: 2-digit
  hour12: false
  # https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat/DateTimeFormat#timezonename
  timeZoneName: short
  # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  # timeZone: 'America/New_York'
Today: Oggi
Yesterday: Ieri

