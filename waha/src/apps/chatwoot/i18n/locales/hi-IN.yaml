app.connected.message: |-
  🔗 **कनेक्टेड: व्हाट्सएप सत्र से इनबॉक्स**

  ✅ व्हाट्सएप सत्र **{{{name}}}** सफलतापूर्वक इस इनबॉक्स से जुड़ गया है।

  यह इनबॉक्स अब आपके **व्हाट्सएप खाते** से जुड़ा हुआ है। आप यहां से सीधे संदेश भेज और प्राप्त कर सकते हैं — बिल्कुल व्हाट्सएप का उपयोग करने जैसा, लेकिन आपके कार्यक्षेत्र के भीतर।

  आप इस इनबॉक्स से जुड़े व्हाट्सएप सत्र को भी प्रबंधित कर सकते हैं। उपलब्ध कार्यों को देखने के लिए, इस चैट पर **help** भेजें।

  📋 आप जो सामान्य कार्य कर सकते हैं:
  - जांचें कि क्या व्हाट्सएप सत्र सक्रिय है
  - व्हाट्सएप सत्र को पुनरारंभ या बंद करें
  - लॉग आउट करें और नए QR कोड को स्कैन करके फिर से कनेक्ट करें

  यदि सब कुछ काम कर रहा है, तो आप स्वतंत्र रूप से चैट कर पाएंगे। यदि आप चेतावनियां देखते हैं, तो आपको अपने व्हाट्सएप खाते को फिर से कनेक्ट करने की आवश्यकता हो सकती है।

  चलिए शुरू करते हैं! 🚀

app.disconnected.message: |-
  🔌 **डिस्कनेक्टेड: व्हाट्सएप सत्र से इनबॉक्स**

  ❌ व्हाट्सएप सत्र **{{{name}}}** इस इनबॉक्स से डिस्कनेक्ट हो गया है।

  आप अब व्हाट्सएप से संदेश भेज या प्राप्त नहीं कर पाएंगे।

  फिर से कनेक्ट करने के लिए, कृपया अपने प्रशासक से संपर्क करें।

app.updated.message: |-
  🔄 **अपडेटेड: व्हाट्सएप सत्र सेटिंग्स**

  ✅ व्हाट्सएप सत्र **{{{name}}}** की सेटिंग्स अपडेट की गई हैं।

