task.messages.status: |-
  Mensajes **{{{chat}}}** en el periodo ⏱️ **{{{period}}}**. ⚙️ Estado del trabajo: **{{state}}**.

  🗨️ Mensajes:
  - 🆕 Creados: **{{{progress.ok}}}**
  - 🟢 Ya existen: {{{progress.exists}}}
  - ⚪ Ignorados: {{{progress.ignored}}}
  - 🔴 Errores: {{{progress.errors}}}
  {{#messages.first}}
  - 🗓️ Más antiguo: **{{{messages.first}}}**
  {{/messages.first}}
  {{#messages.last}}
  - 🗓️ Más reciente: **{{{messages.last}}}**
  {{/messages.last}}

  💬 Chats de WhatsApp:
  - 🆕 Nuevos mensajes en **{{{chats}}}** chats
  {{#options.resolveConversations}}

  🗣️ Conversaciones:
  - 🟢 Resueltas: **{{{progress.conversationResolve.success}}}**
  {{#progress.conversationResolve.error}}
  - 🔴 Errores: **{{{progress.conversationResolve.error}}}**
  {{/progress.conversationResolve.error}}
