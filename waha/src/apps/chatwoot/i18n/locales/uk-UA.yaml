cli.cmd.messages.summary: Отримати повідомлення WhatsApp.
cli.cmd.messages.description:
  💬 Виконайте `messages pull`, щоб запустити синхронізацію, або `messages
  status`, щоб переглянути прогрес.
cli.cmd.messages.action.description:
  '`pull` — щоб почати отримання, `status` — щоб переглянути активне завдання.'
cli.cmd.messages.pull.option.chat:
  Обмежити отримання конкретним ідентифікатором чату WhatsApp.
cli.cmd.messages.pull.option.force:
  Примусити скриньку створювати повідомлення, навіть якщо повідомлення WhatsApp
  уже є у відповідності розмови.
cli.cmd.messages.pull.option.batch: Кількість повідомлень у кожній партії.
cli.cmd.messages.pull.option.progress:
  Повідомляти про прогрес кожні N повідомлень. Значення 0 вимикає звіти.
cli.cmd.messages.pull.option.no-dm:
  Пропускати приватні повідомлення під час отримання історії.
cli.cmd.messages.pull.option.groups:
  Включати групи WhatsApp під час отримання історії.
cli.cmd.messages.pull.option.channels:
  Включати канали WhatsApp під час отримання історії.
cli.cmd.messages.pull.option.status:
  Включати статуси WhatsApp під час отримання історії.
cli.cmd.messages.pull.option.broadcast:
  Включати списки розсилки під час отримання історії.
cli.cmd.messages.pull.option.media:
  Завантажувати медіафайли (зображення, відео, файли) під час отримання історії.
cli.cmd.messages.pull.option.pause:
  Поставити завдання отримання повідомлень у чергу на паузі й зупинити обробку
  нових WhatsApp до завершення.
cli.cmd.messages.pull.option.resolve-conversations:
  Позначає розмови як завершені після обробки всієї історії повідомлень.
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ Неможливо використати `--pause`, оскільки команда **queue** вимкнена для
  цієї конфігурації.
cli.cmd.queue.description: Керування чергами.
cli.cmd.queue.summary: Дії з чергами.
cli.cmd.queue.action.description: Оберіть дію.
cli.cmd.queue.status.description: Показати стан черги.
cli.cmd.queue.argument.name:
  'Назва черги: `inbox` або `whatsapp` (необов’язково).'
cli.cmd.queue.start.description: Запустити чергу за назвою.
cli.cmd.queue.stop.description: Зупинити чергу за назвою.
cli.cmd.queue.paused:
  ⚪🧩 Черги призупинені. Надішліть `queue status`, щоб перевірити стан.
cli.cmd.queue.resumed:
  🟢🧩 Черги поновлено. Надішліть `queue status`, щоб перевірити стан.
cli.cmd.queue.status.result: >-
  📊 Стан черг:

  {{#queues}}

  - **{{name}}**: {{#locked}}🔒{{/locked}}{{#paused}}⚪ На
  паузі{{/paused}}{{^paused}}🟢 Активна{{/paused}}

  {{/queues}}
cli.cmd.messages.pull.option.timeout-media:
  Визначає, як довго намагатися завантажувати медіа для кожного повідомлення.
cli.cmd.messages.pull.argument.end:
  Вказує, де закінчується вікно отримання; наприклад, `2d` — два дні тому.
cli.cmd.messages.pull.argument.start:
  Вказує, де починається вікно; наприклад, `1d` — один день тому (за
  замовчуванням `0d`, тобто зараз).
cli.cmd.messages.pull.already-running: >-
  ⏳ Завдання **Pull Messages** уже виконується для **{{{chat}}}**. Дочекайтеся
  завершення або зупиніть його перед запуском нового.


  Надішліть `messages status`, щоб отримати деталі.
cli.cmd.messages.status.not-found:
  ℹ️ Активне завдання **Pull Messages** не знайдено. Запустіть його командою
  `messages pull`.
cli.cmd.messages.pull.no-chats-found:
  Не знайдено чатів WhatsApp для вибраного періоду.
cli.cmd.contacts.pull.option.progress:
  Повідомляти про прогрес кожні N контактів. Значення 0 вимикає звіти.
cli.cmd.contacts.pull.option.lids:
  Включати анонімні контакти WhatsApp LID у синхронізацію.
