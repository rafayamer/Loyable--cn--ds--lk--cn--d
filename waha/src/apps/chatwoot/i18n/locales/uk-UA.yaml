app.connected.message: |-
  🔗 **ПІДКЛЮЧЕНО: Сесія WhatsApp до вхідних**

  ✅ Сесія WhatsApp **{{{name}}}** була успішно підключена до цих вхідних.

  Ці вхідні тепер пов'язані з вашим **Обліковим записом WhatsApp**. Ви можете надсилати та отримувати повідомлення безпосередньо звідси — так само, як використовуючи WhatsApp, але у своєму робочому просторі.

  Ви також можете керувати сесією WhatsApp, пов'язаною з цими вхідними. Щоб переглянути доступні дії, надішліть **help** у цей чат.

  📋 Загальні дії, які ви можете виконати:
  - Перевірити, чи активна сесія WhatsApp
  - Перезапустити або Зупинити сесію WhatsApp
  - Вийти та повторно підключитися, відсканувавши новий QR-код

  Якщо все працює, ви зможете вільно спілкуватися. Якщо ви бачите попередження, можливо, вам потрібно повторно підключити свій обліковий запис WhatsApp.

  Давайте почнемо! 🚀

app.disconnected.message: |-
  🔌 **ВІДКЛЮЧЕНО: Сесія WhatsApp від вхідних**

  ❌ Сесія WhatsApp **{{{name}}}** була відключена від цих вхідних.

  Ви більше не зможете надсилати або отримувати повідомлення з WhatsApp.

  Щоб повторно підключитися, зверніться до свого адміністратора.

app.updated.message: |-
  🔄 **ОНОВЛЕНО: Налаштування сесії WhatsApp**

  ✅ Налаштування для сесії WhatsApp **{{{name}}}** були оновлені.

