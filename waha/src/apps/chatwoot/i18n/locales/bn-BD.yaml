app.connected.message: |-
  🔗 **সংযুক্ত: হোয়াটসঅ্যাপ সেশন থেকে ইনবক্স**

  ✅ হোয়াটসঅ্যাপ সেশন **{{{name}}}** সফলভাবে এই ইনবক্সের সাথে সংযুক্ত করা হয়েছে।

  এই ইনবক্সটি এখন আপনার **হোয়াটসঅ্যাপ অ্যাকাউন্টের** সাথে সংযুক্ত। আপনি এখান থেকে সরাসরি বার্তা পাঠাতে এবং গ্রহণ করতে পারেন — ঠিক হোয়াটসঅ্যাপ ব্যবহার করার মতো, কিন্তু এই ওয়ার্কস্পেসের ভিতরে।

  আপনি এই ইনবক্সের সাথে সংযুক্ত হোয়াটসঅ্যাপ সেশনও পরিচালনা করতে পারেন। উপলব্ধ কার্যগুলি দেখতে, এই চ্যাটে **help** পাঠান।

  📋 আপনি যে সাধারণ কাজগুলি করতে পারেন:
  - হোয়াটসঅ্যাপ সেশন সক্রিয় কিনা তা পরীক্ষা করুন
  - হোয়াটসঅ্যাপ সেশন পুনরায় চালু করুন বা বন্ধ করুন
  - লগ আউট করুন এবং নতুন QR কোড স্ক্যান করে পুনরায় সংযোগ করুন

  যদি সবকিছু কাজ করে, আপনি স্বাধীনভাবে চ্যাট করতে পারবেন। যদি আপনি সতর্কতা দেখেন, আপনাকে আপনার হোয়াটসঅ্যাপ অ্যাকাউন্ট পুনরায় সংযোগ করতে হতে পারে।

  চলুন শুরু করা যাক! 🚀

app.disconnected.message: |-
  🔌 **সংযোগ বিচ্ছিন্ন: হোয়াটসঅ্যাপ সেশন থেকে ইনবক্স**

  ❌ হোয়াটসঅ্যাপ সেশন **{{{name}}}** এই ইনবক্স থেকে সংযোগ বিচ্ছিন্ন করা হয়েছে।

  আপনি আর হোয়াটসঅ্যাপ থেকে বার্তা পাঠাতে বা গ্রহণ করতে পারবেন না।

  পুনরায় সংযোগ করতে, অনুগ্রহ করে আপনার প্রশাসকের সাথে যোগাযোগ করুন।

app.updated.message: |-
  🔄 **আপডেট করা হয়েছে: হোয়াটসঅ্যাপ সেশন সেটিংস**

  ✅ হোয়াটসঅ্যাপ সেশন **{{{name}}}** এর সেটিংস আপডেট করা হয়েছে।

