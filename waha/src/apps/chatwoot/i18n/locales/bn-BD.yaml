cli.cmd.root.sub.queue: '🧩 **কিউ**:'
cli.cmd.messages.summary: WhatsApp বার্তা টানুন।
cli.cmd.messages.description:
  💬 বার্তা সিঙ্ক শুরু করতে `messages pull` চালান অথবা অগ্রগতি দেখতে `messages
  status` চালান।
cli.cmd.messages.action.description:
  বার্তা টানতে `pull` ব্যবহার করুন অথবা সক্রিয় কাজ দেখার জন্য `status`।
cli.cmd.messages.pull.option.chat:
  নির্দিষ্ট WhatsApp চ্যাট আইডিতে টান সীমাবদ্ধ করুন।
cli.cmd.messages.pull.option.force:
  WhatsApp বার্তা কথোপকথনের ম্যাপিংয়ে থাকলেও ইনবক্সকে বার্তা তৈরি করতে বাধ্য
  করুন।
cli.cmd.messages.pull.option.batch: প্রতিটি ব্যাচে কতটি বার্তা টানবেন।
cli.cmd.messages.pull.option.progress:
  প্রতি N বার্তায় অগ্রগতি জানায়। রিপোর্ট বন্ধ করতে 0 সেট করুন।
cli.cmd.messages.pull.option.no-dm: ইতিহাস টানার সময় সরাসরি বার্তা উপেক্ষা করুন।
cli.cmd.messages.pull.option.groups:
  ইতিহাস টানার সময় WhatsApp গ্রুপ অন্তর্ভুক্ত করুন।
cli.cmd.messages.pull.option.channels:
  ইতিহাস টানার সময় WhatsApp চ্যানেল অন্তর্ভুক্ত করুন।
cli.cmd.messages.pull.option.status:
  ইতিহাস টানার সময় WhatsApp স্ট্যাটাস আপডেট অন্তর্ভুক্ত করুন।
cli.cmd.messages.pull.option.broadcast:
  ইতিহাস টানার সময় ব্রডকাস্ট তালিকা অন্তর্ভুক্ত করুন।
cli.cmd.messages.pull.option.media:
  ইতিহাস টানার সময় মিডিয়া (ছবি, ভিডিও, ফাইল) ডাউনলোড করুন।
cli.cmd.messages.pull.option.pause:
  বার্তা টানার কাজটিকে বিরতি অবস্থায় কিউতে রাখে এবং শেষ না হওয়া পর্যন্ত নতুন
  WhatsApp বার্তার প্রসেসিং বন্ধ রাখে।
cli.cmd.messages.pull.option.resolve-conversations:
  সমস্ত ইতিহাস বার্তা প্রক্রিয়ার পর কথোপকথনগুলোকে সমাধান হয়েছে হিসেবে চিহ্নিত
  করে।
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ `--pause` ব্যবহার করা যাবে না কারণ এই কনফিগারেশনে **queue** কমান্ড
  নিষ্ক্রিয়।
cli.cmd.queue.description: কিউ পরিচালনা করুন।
cli.cmd.queue.summary: কিউ-তে কর্ম সম্পাদন করুন।
cli.cmd.queue.action.description: একটি কর্ম নির্বাচন করুন।
cli.cmd.queue.status.description: কিউ-র অবস্থা দেখুন।
