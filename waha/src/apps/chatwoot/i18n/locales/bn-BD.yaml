cli.cmd.queue.start.description: নামের ভিত্তিতে কিউ শুরু করুন।
cli.cmd.queue.stop.description: নামের ভিত্তিতে কিউ বন্ধ করুন।
cli.cmd.queue.paused: ⚪🧩 কিউ বিরতিতে আছে। অবস্থা দেখতে `queue status` পাঠান।
cli.cmd.queue.resumed:
  🟢🧩 কিউ আবার চালু হয়েছে। অবস্থা দেখতে `queue status` পাঠান।
