cli.cmd.messages.pull.argument.start:
  টানার উইন্ডো কোথা থেকে শুরু হবে নির্ধারণ করুন; যেমন `1d` এক দিন আগে শুরু হয়
  (ডিফল্ট `0d`, অর্থাৎ এখন)।
