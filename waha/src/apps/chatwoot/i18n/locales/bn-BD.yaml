cli.cmd.contacts.pull.already-running: |-
  ⏳ **Pull Contacts** কাজটি ইতিমধ্যেই চলছে। এটি শেষ হওয়া পর্যন্ত অপেক্ষা করুন বা নতুন কাজ শুরু করার আগে থামান।

  বিস্তারিত জানতে `contacts status` পাঠান।

cli.cmd.options.job.attempts: |-
