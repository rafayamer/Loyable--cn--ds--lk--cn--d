cli.cmd.root.sub.queue: '🧩 **Fila**:'
cli.cmd.messages.summary: Buscar mensagens do WhatsApp.
cli.cmd.messages.description:
  💬 Execute `messages pull` para solicitar a sincronização de mensagens ou
  `messages status` para acompanhar o progresso.
cli.cmd.messages.action.description:
  '`pull` para iniciar a busca de mensagens ou `status` para inspecionar o
  trabalho em andamento.'
cli.cmd.messages.pull.option.chat:
  Limita a busca a um ID de conversa do WhatsApp específico.
cli.cmd.messages.pull.option.force:
  Força a caixa de entrada a criar mensagens mesmo quando a mensagem do WhatsApp
  já existe no mapeamento da conversa.
cli.cmd.messages.pull.option.batch:
  Quantidade de mensagens buscadas em cada lote.
cli.cmd.messages.pull.option.progress:
  Relata o progresso a cada N mensagens. Defina 0 para desativar os relatórios
  de progresso.
cli.cmd.messages.pull.option.no-dm:
  Ignora mensagens diretas ao buscar o histórico.
cli.cmd.messages.pull.option.groups:
  Inclui conversas em grupo do WhatsApp ao buscar o histórico.
cli.cmd.messages.pull.option.channels:
  Inclui canais do WhatsApp ao buscar o histórico.
cli.cmd.messages.pull.option.status:
  Inclui atualizações de status do WhatsApp ao buscar o histórico.
cli.cmd.messages.pull.option.broadcast:
  Inclui listas de transmissão ao buscar o histórico.
cli.cmd.messages.pull.option.media:
  Baixa anexos de mídia (imagens, vídeos, arquivos) ao buscar o histórico.
cli.cmd.messages.pull.option.pause:
  Enfileira o trabalho de busca de mensagens em estado pausado, interrompendo o
  processamento de novos WhatsApp até finalizar.
cli.cmd.messages.pull.option.resolve-conversations:
  Marca as conversas como resolvidas depois que todas as mensagens do histórico
  forem processadas.
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ Não é possível usar `--pause` porque o comando **queue** está desabilitado
  nesta configuração.
cli.cmd.queue.description: Gerencie filas.
cli.cmd.queue.summary: Execute ações nas filas.
cli.cmd.queue.action.description: Escolha uma ação.
cli.cmd.queue.status.description: Mostra o status de uma fila.
cli.cmd.queue.argument.name: 'Nome da fila: `inbox` ou `whatsapp` (opcional).'
cli.cmd.queue.start.description: Inicia uma fila pelo nome.
cli.cmd.queue.stop.description: Para uma fila pelo nome.
cli.cmd.queue.paused:
  ⚪🧩 As filas foram pausadas. Envie `queue status` para verificar o status.
cli.cmd.queue.resumed:
  🟢🧩 As filas foram retomadas. Envie `queue status` para verificar o status.
cli.cmd.queue.status.result: >-
  📊 Status da fila:

  {{#queues}}

  - **{{name}}**: {{#locked}}🔒{{/locked}}{{#paused}}⚪ Em
  pausa{{/paused}}{{^paused}}🟢 Em execução{{/paused}}

  {{/queues}}
cli.cmd.messages.pull.option.timeout-media:
  Define por quanto tempo tentar baixar a mídia de cada mensagem.
cli.cmd.messages.pull.argument.end:
  Define até onde a janela de busca termina; por exemplo, `2d` encerra há dois
  dias.
cli.cmd.messages.pull.argument.start:
  Define onde a janela de busca começa; por exemplo, `1d` inicia há um dia
  (padrão `0d`, ou seja, agora).
cli.cmd.messages.pull.already-running: >-
  ⏳ O trabalho **Pull Messages** já está em execução para **{{{chat}}}**.
  Aguarde terminar ou pare antes de iniciar outro.


  Envie `messages status` para mais detalhes.
cli.cmd.messages.status.not-found:
  ℹ️ Nenhum trabalho ativo de **Pull Messages** foi encontrado. Inicie um com
  `messages pull`.
cli.cmd.messages.pull.no-chats-found:
  Nenhuma conversa do WhatsApp encontrada para buscar mensagens nesse período.
cli.cmd.contacts.pull.option.progress:
  Informa o progresso a cada N contatos. Defina 0 para desativar os relatórios
  de progresso.
cli.cmd.contacts.pull.option.lids:
  Inclui contatos LID do WhatsApp (contatos anônimos) na sincronização.
