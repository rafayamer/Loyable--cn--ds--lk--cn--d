  אילוץ תיבת הדואר הנכנס ליצור הודעות גם אם ההודעה כבר קיימת במיפוי השיחה.
cli.cmd.messages.pull.option.batch: כמות ההודעות הנמשכות בכל אצווה.
cli.cmd.messages.pull.option.progress:
  דיווח על ההתקדמות כל N הודעות. ערך 0 מבטל את הדוחות.
cli.cmd.messages.pull.option.no-dm: דילוג על הודעות פרטיות בעת משיכת ההיסטוריה.
cli.cmd.messages.pull.option.groups: הכללת קבוצות WhatsApp בעת משיכת ההיסטוריה.
cli.cmd.messages.pull.option.channels: הכללת ערוצי WhatsApp בעת משיכת ההיסטוריה.
cli.cmd.messages.pull.option.status:
  הכללת סטטוסים של WhatsApp בעת משיכת ההיסטוריה.
cli.cmd.messages.pull.option.broadcast: הכללת רשימות שידור בעת משיכת ההיסטוריה.
cli.cmd.messages.pull.option.media:
  הורדת קבצי מדיה (תמונות, סרטונים, קבצים) בעת משיכת ההיסטוריה.
cli.cmd.messages.pull.option.pause:
  הכנסת משימת המשיכה לתור במצב מושהה ועצירת עיבוד הודעות WhatsApp חדשות עד
  לסיום.
cli.cmd.messages.pull.option.resolve-conversations:
  מסמן את השיחות כפתורות לאחר שכל הודעות ההיסטוריה עובדו.
cli.cmd.messages.pull.error.pause-no-queue:
  ⛔ לא ניתן להשתמש ב-`--pause` כי הפקודה **queue** מושבתת בתצורה זו.
cli.cmd.queue.description: ניהול תורים.
cli.cmd.queue.summary: ביצוע פעולות על תורים.
cli.cmd.queue.action.description: בחרו פעולה.
cli.cmd.queue.status.description: הצגת מצב התור.
cli.cmd.queue.argument.name: 'שם התור: `inbox` או `whatsapp` (רשות).'
cli.cmd.queue.start.description: הפעלת תור לפי שם.
cli.cmd.queue.stop.description: עצירת תור לפי שם.
cli.cmd.queue.paused: ⚪🧩 התורים הושהו. שלחו `queue status` כדי לבדוק את המצב.
cli.cmd.queue.resumed: 🟢🧩 התורים חודשו. שלחו `queue status` כדי לבדוק את המצב.
cli.cmd.queue.status.result: >-
  📊 מצב התור:

  {{#queues}}

  - **{{name}}**: {{#locked}}🔒{{/locked}}{{#paused}}⚪
  מושהה{{/paused}}{{^paused}}🟢 פעיל{{/paused}}

  {{/queues}}
cli.cmd.messages.pull.option.timeout-media:
  הגדרת משך הניסיון להוריד מדיה לכל הודעה.
cli.cmd.messages.pull.argument.end:
  הגדרת נקודת הסיום של חלון המשיכה; למשל `2d` נעצר יומיים אחורה.
cli.cmd.messages.pull.argument.start:
  הגדרת נקודת ההתחלה של החלון; למשל `1d` מתחיל יום אחורה (ברירת המחדל `0d`,
  כלומר עכשיו).
cli.cmd.messages.pull.already-running: >-
  ⏳ המשימה **Pull Messages** כבר פועלת עבור **{{{chat}}}**. המתינו לסיום או
  עצרו לפני התחלת משימה חדשה.


  שלחו `messages status` לפרטים.
cli.cmd.messages.status.not-found:
  ℹ️ לא נמצאה משימת **Pull Messages** פעילה. התחילו אחת עם `messages pull`.
cli.cmd.messages.pull.no-chats-found: לא נמצאו שיחות WhatsApp למשיכה בתקופה זו.
cli.cmd.contacts.pull.option.progress:
  דיווח על התקדמות כל N אנשי קשר. ערך 0 מבטל את הדוחות.
cli.cmd.contacts.pull.option.lids:
  הכללת אנשי קשר אנונימיים של WhatsApp (LID) בסנכרון.
task.contacts.completed:
  👤✅ השלמת אנשי קשר → 🆕 {{progress.created}}, 🔄 {{progress.updated}}, ⚪
  {{progress.skipped}}, 🔴 {{progress.errors}}, 🖼️ {{progress.avatar.updated}}
task.messages.started: ⏳ מושכים הודעות 💬 {{{chat}}} ⏱️ {{{period}}}...
task.messages.details: שלחו "{{{prefix}}}messages status" לעוד פרטים.
task.messages.progress:
  '⏳ הודעות {{{chat}}}: 🆕 {{progress.ok}}, 🟢 {{progress.exists}}, ⚪
  {{progress.ignored}}, 🔴 {{progress.errors}}{{#messages.last}} | 📅
  {{{messages.last}}}{{/messages.last}}'
task.messages.completed:
  ✅ הודעות {{{chat}}} במהלך {{{period}}} → 🆕 {{progress.ok}}, 🟢
  {{progress.exists}}, ⚪ {{progress.ignored}}, 🔴 {{progress.errors}}
task.messages.status: |-
  הודעות **{{{chat}}}** בתקופה ⏱️ **{{{period}}}**. ⚙️ מצב המשימה: **{{state}}**.

  🗨️ הודעות:
  - 🆕 נוצרו: **{{{progress.ok}}}**
  - 🟢 קיימות כבר: {{{progress.exists}}}
  - ⚪ הוזנחו: {{{progress.ignored}}}
  - 🔴 שגיאות: {{{progress.errors}}}
  {{#messages.first}}
  - 🗓️ ישן ביותר: **{{{messages.first}}}**
  {{/messages.first}}
  {{#messages.last}}
  - 🗓️ חדש ביותר: **{{{messages.last}}}**
  {{/messages.last}}

  💬 שיחות WhatsApp:
  - 🆕 הודעות חדשות ב-**{{{chats}}}** שיחות
  {{#options.resolveConversations}}

  🗣️ שיחות:
  - 🟢 נפתרו: **{{{progress.conversationResolve.success}}}**
  {{#progress.conversationResolve.error}}
  - 🔴 שגיאות: **{{{progress.conversationResolve.error}}}**
  {{/progress.conversationResolve.error}}
  {{/options.resolveConversations}}

  פרטים:
  [{{{details.text}}}]({{{details.url}}})
