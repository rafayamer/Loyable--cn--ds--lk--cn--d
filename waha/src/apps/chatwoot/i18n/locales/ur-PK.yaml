app.connected.message: |-
  🔗 **منسلک: واٹس ایپ سیشن انبکس سے**

  ✅ واٹس ایپ سیشن **{{{name}}}** کامیابی سے اس انبکس سے منسلک ہو گیا ہے۔

  یہ انبکس اب آپ کے **واٹس ایپ اکاؤنٹ** سے منسلک ہے۔ آپ یہاں سے براہ راست پیغامات بھیج اور موصول کر سکتے ہیں — بالکل واٹس ایپ استعمال کرنے کی طرح، لیکن اس ورک اسپیس کے اندر۔

  آپ اس انبکس سے منسلک واٹس ایپ سیشن کا انتظام بھی کر سکتے ہیں۔ دستیاب اقدامات دیکھنے کے لیے، اس چیٹ میں **help** بھیجیں۔

  📋 عام اقدامات جو آپ کر سکتے ہیں:
  - چیک کریں کہ آیا واٹس ایپ سیشن فعال ہے
  - واٹس ایپ سیشن کو دوبارہ شروع کریں یا روکیں
  - لاگ آؤٹ کریں اور نیا QR کوڈ اسکین کر کے دوبارہ منسلک ہوں

  اگر سب کچھ کام کر رہا ہے، تو آپ آزادانہ طور پر چیٹ کر سکیں گے۔ اگر آپ کو انتباہات نظر آتے ہیں، تو آپ کو اپنے واٹس ایپ اکاؤنٹ کو دوبارہ منسلک کرنے کی ضرورت ہو سکتی ہے۔

  آئیے شروع کریں! 🚀

app.disconnected.message: |-
  🔌 **منقطع: واٹس ایپ سیشن انبکس سے**

  ❌ واٹس ایپ سیشن **{{{name}}}** اس انبکس سے منقطع ہو گیا ہے۔

  آپ اب واٹس ایپ سے پیغامات بھیجنے یا موصول کرنے کے قابل نہیں ہوں گے۔

  دوبارہ منسلک ہونے کے لیے، براہ کرم اپنے منتظم سے رابطہ کریں۔

app.updated.message: |-
  🔄 **اپڈیٹ شدہ: واٹس ایپ سیشن کی ترتیبات**

  ✅ واٹس ایپ سیشن **{{{name}}}** کی ترتیبات اپڈیٹ کر دی گئی ہیں۔

