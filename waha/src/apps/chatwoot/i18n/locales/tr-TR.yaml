cli.cmd.contacts.pull.option.progress:
  Her N kişide ilerlemeyi bildirir. 0 değeri raporları kapatır.
cli.cmd.contacts.pull.option.lids:
  Senkronizasyona WhatsApp LID (anonim) kişilerini dahil eder.
task.contacts.completed:
  👤✅ Kişiler tamamlandı → 🆕 {{progress.created}}, 🔄 {{progress.updated}}, ⚪
  {{progress.skipped}}, 🔴 {{progress.errors}}, 🖼️ {{progress.avatar.updated}}
task.messages.started: ⏳ Mesajlar çekiliyor 💬 {{{chat}}} ⏱️ {{{period}}}...
task.messages.details:
  Daha fazla ayrıntı için "{{{prefix}}}messages status" gönderin.
task.messages.progress:
  '⏳ Mesajlar {{{chat}}}: 🆕 {{progress.ok}}, 🟢 {{progress.exists}}, ⚪
  {{progress.ignored}}, 🔴 {{progress.errors}}{{#messages.last}} | 📅
  {{{messages.last}}}{{/messages.last}}'
task.messages.completed:
  ✅ Mesajlar {{{chat}}} {{{period}}} içinde → 🆕 {{progress.ok}}, 🟢
  {{progress.exists}}, ⚪ {{progress.ignored}}, 🔴 {{progress.errors}}
task.messages.status: |-
  **{{{chat}}}** sohbetinin mesajları ⏱️ **{{{period}}}** döneminde. ⚙️ İş durumu: **{{state}}**.

  🗨️ Mesajlar:
  - 🆕 Oluşturulan: **{{{progress.ok}}}**
  - 🟢 Zaten mevcut: {{{progress.exists}}}
  - ⚪ Yok sayılan: {{{progress.ignored}}}
  - 🔴 Hatalar: {{{progress.errors}}}
  {{#messages.first}}
  - 🗓️ En eski: **{{{messages.first}}}**
  {{/messages.first}}
  {{#messages.last}}
  - 🗓️ En yeni: **{{{messages.last}}}**
  {{/messages.last}}

  💬 WhatsApp sohbetleri:
  - 🆕 **{{{chats}}}** sohbette yeni mesajlar
  {{#options.resolveConversations}}

  🗣️ Konuşmalar:
  - 🟢 Çözüldü: **{{{progress.conversationResolve.success}}}**
  {{#progress.conversationResolve.error}}
  - 🔴 Hatalar: **{{{progress.conversationResolve.error}}}**
  {{/progress.conversationResolve.error}}
  {{/options.resolveConversations}}

  Detaylar:
  [{{{details.text}}}]({{{details.url}}})
